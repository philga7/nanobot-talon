x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ~/.nanobot:/root/.nanobot
  environment:
    # Default workspace inside the container; override NANOBOT_WORKSPACE per environment
    # (e.g. /Users/you/.nanobot/workspace for WrenAir, /root/.nanobot-wren-vps/workspace for WrenVPS)
    - NANOBOT_WORKSPACE=${NANOBOT_WORKSPACE:-/root/.nanobot/workspace}

services:
  talon-mem0-mcp:
    build: ./services/mem0-mcp
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - MEM0_API_URL=${MEM0_API_URL:-http://host.docker.internal:8000}
      - MEM0_USER_ID=${MEM0_USER_ID:-default}
      - MEM0_TOP_K=${MEM0_TOP_K:-5}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *common-config
    command: ["gateway", "--config", "/root/.nanobot/config.json"]
    restart: unless-stopped
    ports:
      - 18790:18790
    networks:
      - mcp-net
    depends_on:
      - talon-mem0-mcp
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
  
  nanobot-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true

  journaling-mcp:
    build:
      context: ./servers/journaling_mcp
      dockerfile: Dockerfile.journaling
    restart: unless-stopped
    environment:
      - JOURNAL_DIR=/data/journal
    volumes:
      - ~/.nanobot/workspace/journal:/data/journal
    ports:
      - "3010:3010"
    networks:
      - mcp-net

  todo-md-mcp:
    build:
      context: ./servers/todo-md-mcp
      dockerfile: Dockerfile.todo
    restart: unless-stopped
    environment:
      - TODO_FILE_PATH=/data/todo/todo.md
    volumes:
      - ~/.nanobot/workspace/todos:/data/todo
    ports:
      - "3011:3011"
    networks:
      - mcp-net

  library-mcp:
    build:
      context: ./servers/library-mcp
      dockerfile: Dockerfile.library
    restart: unless-stopped
    volumes:
      - ~/.nanobot/workspace/library:/data/library  # ← typo fixed
    ports:
      - "3012:3012"
    networks:
      - mcp-net

networks:
  mcp-net:
    driver: bridge